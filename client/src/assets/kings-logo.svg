<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 106" width="120" height="106">
  <!-- Black rounded banner -->
  <rect x="6" y="70" width="108" height="34" rx="17" ry="17" fill="#000"/>
  <text x="60" y="93" text-anchor="middle" fill="#fff"
        font-family="Georgia, 'Times New Roman', serif" font-size="21"
        font-weight="bold" font-style="italic">King's</text>

  <!-- White crown with black outline — 3 peaks, sits on banner -->
  <path fill="#fff" stroke="#000" stroke-width="2.4" stroke-linejoin="round"
        d="
    M16 70
    L16 54 L30 36 L46 50
    L60 16 L74 50 L90 36 L104 54
    L104 70
    Z"/>

  <!-- Ball tips: 3 peaks -->
  <circle cx="30" cy="34" r="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <circle cx="60" cy="12" r="6.5" fill="#fff" stroke="#000" stroke-width="2"/>
  <circle cx="90" cy="34" r="6" fill="#fff" stroke="#000" stroke-width="2"/>

  <!-- Ball tips: 2 bottom corners -->
  <circle cx="16" cy="68" r="5.5" fill="#fff" stroke="#000" stroke-width="2"/>
  <circle cx="104" cy="68" r="5.5" fill="#fff" stroke="#000" stroke-width="2"/>
</svg>
