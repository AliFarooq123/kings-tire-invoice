<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <!--
    5-point solid black crown.
    Ball finials at all 5 peaks and 2 bottom corners.
    "King's" in white italic bold inside the lower crown body.
  -->

  <!-- Crown silhouette -->
  <path fill="#000" stroke="none" d="
    M 8  82
    L 8  50
    L 24 28
    L 40 46
    L 60 10
    L 80 46
    L 96 28
    L 112 50
    L 112 82
    Z
  "/>

  <!-- Ball tips: 5 peaks -->
  <circle cx="24"  cy="26" r="5"   fill="#000"/>
  <circle cx="40"  cy="44" r="4.5" fill="#000"/>
  <circle cx="60"  cy="8"  r="6"   fill="#000"/>
  <circle cx="80"  cy="44" r="4.5" fill="#000"/>
  <circle cx="96"  cy="26" r="5"   fill="#000"/>

  <!-- Ball tips: 2 bottom corners -->
  <circle cx="8"   cy="82" r="5"   fill="#000"/>
  <circle cx="112" cy="82" r="5"   fill="#000"/>

  <!-- "King's" text centered in the lower body of the crown -->
  <text
    x="60" y="74"
    text-anchor="middle"
    fill="#fff"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="22"
    font-weight="900"
    font-style="italic"
  >King's</text>
</svg>
